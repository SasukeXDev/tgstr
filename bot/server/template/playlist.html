<section class="ott-page-heading">
    <div>
        <h1><!-- Title --></h1>
        <p class="ott-copy">Browse subfolders, files, and search results inside this playlist.</p>
    </div>
    <div class="ott-action-row">
        <button type="button" class="ott-button admin-only" onclick="createPopupForm(event)">Create folder</button>
    </div>
</section>

<form class="ott-searchbar" action="/search/db/<!-- Parent_id -->" method="get">
    <input class="ott-field" type="search" placeholder="Search playlist" name="q">
    <button class="ott-button ott-button--ghost" type="submit">Search</button>
</form>

<section class="ott-section">
    <div class="ott-section-header">
        <div>
            <h2>Folders</h2>
            <p class="ott-copy">Nested folders in this collection.</p>
        </div>
    </div>
    <div class="ott-grid">
        <!-- Playlist -->
    </div>
</section>

<section class="ott-section">
    <div class="ott-section-header">
        <div>
            <h2>Files</h2>
            <p class="ott-copy">Playable or downloadable items in this folder.</p>
        </div>
    </div>
    <div class="ott-grid ott-grid--files">
        <!-- Database -->
    </div>
</section>

<div class="ott-pager">
    <button class="ott-button ott-button--ghost" id="prevButton" type="button">Previous</button>
    <button class="ott-button ott-button--ghost" id="nextButton" type="button">Next</button>
</div>

<div class="ott-modal admin-only" id="createFolderModal" aria-hidden="true">
    <div class="ott-modal__panel">
        <div class="ott-modal__header">
            <h3 class="ott-modal__title">Create folder</h3>
            <button type="button" class="ott-icon-button ott-icon-button--ghost" onclick="closeModal('createFolderModal')">✕</button>
        </div>
        <form action="/create" method="post" class="ott-form-grid">
            <label class="ott-label">Folder Name
                <input type="text" class="ott-field" id="folderName" name="folderName" placeholder="Enter folder name">
            </label>
            <label class="ott-label">Thumbnail
                <input type="text" class="ott-field" id="thumbnail" name="thumbnail" placeholder="Thumbnail URL">
            </label>
            <input type="hidden" id="parent_dir" name="parent_dir" readonly>
            <div class="ott-form-actions">
                <button type="button" class="ott-button ott-button--ghost" onclick="closeModal('createFolderModal')">Close</button>
                <button type="submit" class="ott-button">Create</button>
            </div>
        </form>
    </div>
</div>

<div class="ott-modal admin-only" id="editModal" aria-hidden="true">
    <div class="ott-modal__panel">
        <div class="ott-modal__header">
            <h3 class="ott-modal__title">Edit file</h3>
            <button type="button" class="ott-icon-button ott-icon-button--ghost" onclick="closeModal('editModal')">✕</button>
        </div>
        <form action="/edit_post" method="post" class="ott-form-grid">
            <input type="hidden" id="edit_file_id" name="file_id" value="">
            <input type="hidden" id="edit_folder_id" name="file_folder_id" value="">
            <label class="ott-label">File Name
                <input type="text" class="ott-field" id="edit_fileName" name="fileName" value="">
            </label>
            <label class="ott-label">Thumbnail
                <input type="text" class="ott-field" id="edit_filethumbnail" name="filethumbnail" value="">
            </label>
            <div class="ott-form-actions">
                <button type="button" class="ott-button ott-button--danger" onclick="deleteFileItem()">Delete</button>
                <button type="button" class="ott-button ott-button--ghost" onclick="closeModal('editModal')">Close</button>
                <button type="submit" class="ott-button">Save</button>
            </div>
        </form>
    </div>
</div>

<div class="ott-modal admin-only" id="editFolderModal" aria-hidden="true">
    <div class="ott-modal__panel">
        <div class="ott-modal__header">
            <h3 class="ott-modal__title">Edit folder</h3>
            <button type="button" class="ott-icon-button ott-icon-button--ghost" onclick="closeModal('editFolderModal')">✕</button>
        </div>
        <form action="/edit" method="post" class="ott-form-grid">
            <input type="hidden" id="edit_folder_modal_id" name="folder_id" value="">
            <input type="hidden" id="edit_parent" name="parent" value="">
            <label class="ott-label">Folder Name
                <input type="text" class="ott-field" id="edit_folderName" name="folderName" value="">
            </label>
            <label class="ott-label">Thumbnail
                <input type="text" class="ott-field" id="edit_thumbnail" name="thumbnail" value="">
            </label>
            <div class="ott-form-actions">
                <button type="button" class="ott-button ott-button--danger" onclick="deleteItem()">Delete</button>
                <button type="button" class="ott-button ott-button--ghost" onclick="closeModal('editFolderModal')">Close</button>
                <button type="submit" class="ott-button">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id)?.classList.add('is-open');
    }

    function closeModal(id) {
        document.getElementById(id)?.classList.remove('is-open');
    }

    document.addEventListener('DOMContentLoaded', function () {
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        const url = new URL(window.location.href);
        const currentPage = url.searchParams.get('page') ? parseInt(url.searchParams.get('page'), 10) : 1;

        prevButton.addEventListener('click', function () {
            if (currentPage > 1) {
                navigateChannel(url.origin + url.pathname, currentPage - 1);
            }
        });

        nextButton.addEventListener('click', function () {
            navigateChannel(url.origin + url.pathname, currentPage + 1);
        });
    });

    function navigateChannel(url, page) {
        const searchParams = new URLSearchParams(window.location.search);
        const dbQuery = searchParams.get('db');
        const searchQuery = searchParams.get('q');
        let newUrl = url;
        if (dbQuery !== null) {
            newUrl += `?db=${encodeURIComponent(dbQuery)}`;
            newUrl += page > 1 ? `&page=${page}` : '';
        } else if (searchQuery !== null) {
            newUrl += `?q=${encodeURIComponent(searchQuery)}`;
            newUrl += page > 1 ? `&page=${page}` : '';
        } else {
            newUrl += page > 1 ? `?page=${page}` : '';
        }
        window.location.href = newUrl;
    }

    function createPopupForm(event) {
        if (event) event.preventDefault();
        document.getElementById('parent_dir').value = window.location.href;
        openModal('createFolderModal');
    }

    function openEditPopupForm(event, img, ctype, cid, title) {
        event.preventDefault();
        document.getElementById('edit_thumbnail').value = img;
        document.getElementById('edit_folderName').value = title;
        document.getElementById('edit_folder_modal_id').value = cid;
        document.getElementById('edit_parent').value = ctype;
        openModal('editFolderModal');
    }

    function openPostEditPopupForm(event, img, type, size, title, cid, ctype) {
        event.preventDefault();
        document.getElementById('edit_filethumbnail').value = img;
        document.getElementById('edit_fileName').value = title;
        document.getElementById('edit_file_id').value = cid;
        document.getElementById('edit_folder_id').value = ctype;
        openModal('editModal');
    }

    async function deleteItem() {
        const deleteId = document.getElementById('edit_folder_modal_id').value;
        const parent = document.getElementById('edit_parent').value;
        await fetch('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ delete_id: deleteId, parent })
        });
        location.reload();
    }

    async function deleteFileItem() {
        const deleteId = document.getElementById('edit_file_id').value;
        const parent = document.getElementById('edit_folder_id').value;
        await fetch('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ delete_id: deleteId, parent })
        });
        location.reload();
    }

    document.querySelectorAll('.ott-modal').forEach((modal) => {
        modal.addEventListener('click', (event) => {
            if (event.target === modal) modal.classList.remove('is-open');
        });
    });
</script>
