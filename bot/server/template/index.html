<section class="ott-page-heading">
    <div>
        <h1><!-- Title --></h1>
        <p class="ott-copy">Browse items in this channel or search the catalog.</p>
    </div>
    <div class="ott-action-row">
        <button type="button" class="ott-button ott-button--ghost admin-only" onclick="location.href='/reload?chatId=<!-- Chat_id -->'">Reload</button>
        <button type="button" class="ott-button admin-only" onclick="sendPopupForm()">Send</button>
    </div>
</section>

<form class="ott-searchbar" action="/search/<!-- Chat_id -->" method="get">
    <input class="ott-field" type="search" placeholder="Search channel" name="q">
    <button class="ott-button ott-button--ghost" type="submit">Search</button>
</form>

<section class="ott-section">
    <div class="ott-grid ott-grid--files">
        <!-- Print -->
    </div>
</section>

<div class="ott-pager">
    <button class="ott-button ott-button--ghost" id="prevButton" type="button">Previous</button>
    <button class="ott-button ott-button--ghost" id="nextButton" type="button">Next</button>
</div>

<div class="ott-modal admin-only" id="sendFileModal" aria-hidden="true">
    <div class="ott-modal__panel">
        <div class="ott-modal__header">
            <h3 class="ott-modal__title">Send to folder</h3>
            <button type="button" class="ott-icon-button ott-icon-button--ghost" onclick="closeModal('sendFileModal')">✕</button>
        </div>
        <form action="/send" method="post" id="sendPopupForm" class="ott-form-grid">
            <input type="hidden" id="chatId" name="chatId" value="<!-- Chat_id -->">
            <input type="hidden" id="selectedIds" name="selectedIds">
            <input type="hidden" id="folderId" name="folderId">
            <label class="ott-label">Search Folder
                <input type="text" class="ott-field" id="folderSearch" name="folderSearch">
            </label>
            <label class="ott-label">Folder
                <select class="ott-select" id="folderDropdown"></select>
            </label>
            <div class="ott-form-actions">
                <button type="button" class="ott-button ott-button--ghost" onclick="closeModal('sendFileModal')">Close</button>
                <button type="submit" class="ott-button" onclick="submitSendForm()" id="sendButton" disabled>Submit</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id)?.classList.add('is-open');
    }

    function closeModal(id) {
        document.getElementById(id)?.classList.remove('is-open');
    }

    document.addEventListener('DOMContentLoaded', function () {
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        const url = new URL(window.location.href);
        const currentPage = url.searchParams.get('page') ? parseInt(url.searchParams.get('page'), 10) : 1;

        prevButton.addEventListener('click', function () {
            if (currentPage > 1) {
                navigateChannel(url.origin + url.pathname, currentPage - 1);
            }
        });

        nextButton.addEventListener('click', function () {
            navigateChannel(url.origin + url.pathname, currentPage + 1);
        });
    });

    function navigateChannel(url, page) {
        const searchParams = new URLSearchParams(window.location.search);
        const searchQuery = searchParams.get('q');
        let newUrl = url;
        if (searchQuery !== null) {
            newUrl += `?q=${encodeURIComponent(searchQuery)}`;
            newUrl += page > 1 ? `&page=${page}` : '';
        } else {
            newUrl += page > 1 ? `?page=${page}` : '';
        }
        window.location.href = newUrl;
    }

    function sendPopupForm() {
        openModal('sendFileModal');
        checkSendButton();
    }

    function checkSendButton() {
        const checked = Array.from(document.querySelectorAll('#selectCheckbox:checked')).map((box) => box.dataset.id);
        document.getElementById('selectedIds').value = checked.join(',');
        document.getElementById('sendButton').disabled = checked.length === 0;
    }

    function submitSendForm() {
        const dropdown = document.getElementById('folderDropdown');
        document.getElementById('folderId').value = dropdown.value;
    }

    document.getElementById('folderSearch').addEventListener('input', async function () {
        const response = await fetch(`/searchDbFol?query=${encodeURIComponent(this.value)}`);
        const folders = await response.json();
        const dropdown = document.getElementById('folderDropdown');
        dropdown.innerHTML = folders.map((folder) => `<option value="${folder._id}">${folder.name}</option>`).join('');
    });

    document.querySelectorAll('.ott-modal').forEach((modal) => {
        modal.addEventListener('click', (event) => {
            if (event.target === modal) modal.classList.remove('is-open');
        });
    });
</script>
