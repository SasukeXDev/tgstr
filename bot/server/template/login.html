<section class="centered-panel">
    <div class="ott-hero">
        <span class="ott-hero__eyebrow">24-hour access</span>
        <h1>Unlock OTT Lounge</h1>
        <p class="ott-copy">Browse channels, playlists, and search pages after a quick support step. This device stays unlocked for 24 hours using a local timestamp and cookie.</p>
        <div id="errorPopup" class="ott-alert ott-alert--danger ott-alert--hidden"><!-- Error --></div>
        <div class="ott-chip-row">
            <span class="ott-chip">Open the sponsor page</span>
            <span class="ott-chip">Complete verification</span>
            <span class="ott-chip">Unlock and continue</span>
        </div>
        <div class="ott-action-row">
            <button class="ott-button" id="startBtn" type="button">Watch Ad &amp; Unlock</button>
            <button class="ott-button ott-button--ghost" id="unlockBtn" type="button" disabled>Complete verification</button>
        </div>
        <div id="countdown" class="ott-copy"></div>
        <p class="ott-copy"><a href="/admin/login">Admin access</a></p>
    </div>
</section>
<script>
    const redirectUrl = "<!-- RedirectURL -->" || "/";
    const storageKey = "publicUnlockTs";
    const cookieName = "public_unlock_ts";
    const unlockWindowMs = 24 * 60 * 60 * 1000;
    const sponsorUrl = "https://www.effectivegatecpm.com/fhc2mgst?key=adbfe79f99ae39dbb10678b4777a7aca";
    const countdownEl = document.getElementById("countdown");
    const unlockBtn = document.getElementById("unlockBtn");
    const startBtn = document.getElementById("startBtn");
    const errorPopup = document.getElementById("errorPopup");

    function setUnlock(ts) {
        localStorage.setItem(storageKey, String(ts));
        document.cookie = `${cookieName}=${ts}; Max-Age=${24 * 60 * 60}; Path=/; SameSite=Lax`;
    }

    function isUnlocked() {
        const ts = parseInt(localStorage.getItem(storageKey) || "0", 10);
        return ts && (Date.now() - ts) < unlockWindowMs;
    }

    if (isUnlocked()) {
        setUnlock(Date.now());
        window.location.replace(redirectUrl);
    }

    let timerStarted = false;
    let verificationComplete = false;

    function finishVerification() {
        verificationComplete = true;
        unlockBtn.disabled = false;
        unlockBtn.textContent = "Enter OTT Lounge";
        countdownEl.textContent = "Verification complete. You can continue now.";
    }

    startBtn.addEventListener("click", () => {
        if (timerStarted) return;
        timerStarted = true;
        window.open(sponsorUrl, "_blank", "noopener");
        let remaining = 15;
        unlockBtn.disabled = true;
        countdownEl.textContent = `Please stay here while verification completes: ${remaining}s`;
        const timer = setInterval(() => {
            remaining -= 1;
            countdownEl.textContent = remaining > 0
                ? `Please stay here while verification completes: ${remaining}s`
                : "Finalizing verification...";
            if (remaining <= 0) {
                clearInterval(timer);
                finishVerification();
            }
        }, 1000);
    });

    unlockBtn.addEventListener("click", () => {
        if (!verificationComplete) return;
        const ts = Date.now();
        setUnlock(ts);
        window.location.replace(redirectUrl);
    });

    if (errorPopup.textContent.trim()) {
        errorPopup.classList.remove("ott-alert--hidden");
    }
</script>
