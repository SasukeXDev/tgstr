<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360Hub: Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://bootswatch.com/5/<!-- Theme -->/bootstrap.min.css">
</head>
<body>
    <div class="container py-5" style="max-width: 520px;">
        <div class="card">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Admin sign in</h1>
                <p class="text-muted">Public viewers should use the regular unlock page. This form is only for admin tools.</p>
                <div class="alert alert-danger" id="errorBox"><!-- Error --></div>
                <form action="/admin/login" method="post">
                    <input type="hidden" name="redirect_url" value="<!-- RedirectURL -->">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-control" id="username" name="username" autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password">
                    </div>
                    <button class="btn btn-primary" type="submit">Sign in</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        const errorBox = document.getElementById('errorBox');
        if (!errorBox.textContent.trim()) {
            errorBox.style.display = 'none';
        }
    </script>
</body>
</html>
